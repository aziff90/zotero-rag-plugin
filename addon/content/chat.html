<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Zotero RAG Chat</title>
  <script src="chrome://zotero/content/include.js"></script>
  <style>
    :root {
      --bg-color: #f7f7f9;
      --text-color: #333;
      --panel-bg: #fff;
      --border-color: #eaeaea;
      --bubble-bg: #f0f0f5;
      --input-border: #ddd;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #1a1a1a;
        --text-color: #e0e0e0;
        --panel-bg: #2d2d2d;
        --border-color: #404040;
        --bubble-bg: #383838;
        --input-border: #555;
      }
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: var(--bg-color);
      color: var(--text-color);
    }
    #root {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="scripts/chat.js"></script>
</body>
</html>
